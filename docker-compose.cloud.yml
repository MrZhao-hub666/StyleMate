# ====== StyleMate 云端部署（后端 + 前端）======
# 部署到云服务器：docker compose -f docker-compose.cloud.yml up -d
# 边端 YOLO 在用户本机单独启动（bat / uv run / docker compose edge）

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    environment:
      - EDGE_URL=http://localhost:9001
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/.env:/app/.env:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
